name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_EMAILJS_SERVICE_ID:  ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_PUBLIC_KEY:  ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_EMAILJS_TPL_PROF:    ${{ secrets.VITE_EMAILJS_TPL_PROF }}
          VITE_EMAILJS_TPL_CLIENT:  ${{ secrets.VITE_EMAILJS_TPL_CLIENT }}
          VITE_EMAIL_SIMONE:        ${{ secrets.VITE_EMAIL_SIMONE }}
          VITE_EMAIL_RAFAELA:       ${{ secrets.VITE_EMAIL_RAFAELA }}
          VITE_EMAIL_DANI:          ${{ secrets.VITE_EMAIL_DANI }}
          VITE_MP_PUBLIC_KEY:       ${{ secrets.VITE_MP_PUBLIC_KEY }}
          VITE_SUPABASE_URL:        ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON:       ${{ secrets.VITE_SUPABASE_ANON }}
          VITE_BASE_URL:            https://lumiestudio.com.br

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
